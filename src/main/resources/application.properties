spring.application.name=pharmacy-management-system

# ====================================================
# Database – PostgreSQL
# ====================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/pms_db
spring.datasource.username=pms_user
spring.datasource.password=pms_password
spring.datasource.driver-class-name=org.postgresql.Driver

# ====================================================
# JPA / Hibernate
# ====================================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ====================================================
# Flyway
# ====================================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ====================================================
# JWT
# ====================================================
app.jwt.secret=3cfa76ef14937112e8a8d6e943b99d7f7b3f0c1f8e4a1d2b5e8f3c9a0d4e7b2
app.jwt.access-token-expiration-ms=900000
app.jwt.refresh-token-expiration-ms=604800000

# ====================================================
# CORS
# ====================================================
app.cors.allowed-origins=http://localhost:3000,http://localhost:3001

# ====================================================
# Actuator
# ====================================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# ====================================================
# OpenAPI / Swagger
# ====================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ====================================================
# Logging
# ====================================================
logging.level.com.pharmalink.pms=DEBUG
logging.level.org.springframework.security=INFO
